<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grúas y Maniobras Nacionales CR</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f4f6f8;
}

/* NAV */
nav{
  background:#000;
  padding:15px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:1000;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 15px;
  font-size:16px;
  font-weight:bold;
}

nav a:hover{
  opacity:0.7;
}

/* HERO */
.hero{
  height:100vh; /* 🔥 FIX PRINCIPAL */
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  color:white;
  overflow:hidden;

  background-image:
    url('https://res.cloudinary.com/deod0oalc/image/upload/43dcb4ec-8245-41d1-9450-03e1a0432d89_o1z4ys.jpg'),
    url('https://res.cloudinary.com/deod0oalc/image/upload/326a0fda-a150-413b-bc8e-5c8cfa88185a_g4uzaz.jpg'),
    url('https://res.cloudinary.com/deod0oalc/image/upload/v1775851324/Gruas_cigar_wapdc5.jpg'),
    url('https://res.cloudinary.com/deod0oalc/image/upload/v1775851689/49456c19-8887-485c-8f07-63e73889eb71_omdwyn.jpg');

  background-size: 50% 50%;
  background-position: 
    top left,
    top right,
    bottom left,
    bottom right;

  background-repeat: no-repeat;

  /* 🔥 ZOOM SUAVE */
  animation: zoomHero 18s ease-in-out infinite alternate;
}

/* 🔥 ANIMACIÓN ZOOM */
@keyframes zoomHero {
  0%{
    background-size: 50% 50%;
  }
  100%{
    background-size: 55% 55%;
  }
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background: linear-gradient(
    rgba(0,0,0,0.75),
    rgba(0,0,0,0.85)
  );
  z-index:1;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background: radial-gradient(circle at center, rgba(29,78,216,0.25), transparent 70%);
  z-index:1;
}

.hero-content{
  position:relative;
  z-index:2;
}

.hero-logo img{
  height:240px;
  margin-bottom:20px;
  filter: drop-shadow(0 10px 25px rgba(0,0,0,0.7));
}

h1{
  font-size:44px;
}

/* 🔥 ESLOGAN IZQUIERDA + DERECHA */
.slogan-left,
.slogan-right{
  position:absolute;
  top:20px;
  font-size:24px;
  font-weight:700;
  color:white;
  z-index:3;
  max-width:40%;
  text-shadow:0 4px 15px rgba(0,0,0,0.6);
  transition:opacity 0.5s ease;
}

.slogan-left{
  left:25px;
  text-align:left;
}

.slogan-right{
  right:25px;
  text-align:right;
}

/* BOTONES */
.btn{
  margin-top:25px;
  display:inline-block;
  padding:14px 22px;
  background:transparent;
  color:white;
  font-weight:bold;
  text-decoration:none;
  border:2px solid white;
  border-radius:6px;
  transition:0.3s;
}

.btn:hover{
  background:white;
  color:black;
}

.btn.contacto{
  background:#25D366;
  border:2px solid #25D366;
}

.btn.contacto:hover{
  background:#1ebe5d;
  border-color:#1ebe5d;
  color:white;
}

/* RESPONSIVE */
@media(max-width:600px){
  .hero{
    background-size: cover;
    background-position: center;
    animation:none; /* 🔥 evita bug en móviles */
  }

  .hero-logo img{height:160px;}
  h1{font-size:30px;}

  .slogan-left,
  .slogan-right{
    font-size:16px;
    max-width:45%;
  }
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Inicio</a>
  <a href="informacion.html">Información</a>
  <a href="contacto.html">Contacto</a>
</nav>

<section class="hero">

  <!-- ESLOGANES -->
  <div class="slogan-left" id="sloganLeft"></div>
  <div class="slogan-right" id="sloganRight"></div>

  <div class="hero-content">

    <div class="hero-logo">
      <img src="https://res.cloudinary.com/deod0oalc/image/upload/26ee7d16-8917-402c-bfd4-e442ab53bcb5_o2s2vv.png" alt="CR Grúas">
    </div>

    <h1>Grúas y Maniobras Nacionales CR</h1>

    <a class="btn" href="informacion.html">Más información</a>
    <a class="btn contacto" href="contacto.html">Contacto</a>

  </div>

</section>

<script>
const left = [
  "Elevamos tus proyectos",
  "Movemos lo pesado",
  "Precisión total",
  "Soluciones en altura"
];

const right = [
  "Seguridad garantizada",
  "Eficiencia profesional",
  "Confianza total",
  "Respuesta inmediata"
];

let i = 0;

const l = document.getElementById("sloganLeft");
const r = document.getElementById("sloganRight");

setInterval(() => {
  l.style.opacity = 0;
  r.style.opacity = 0;

  setTimeout(() => {
    i = (i + 1) % left.length;

    l.textContent = left[i];
    r.textContent = right[i];

    l.style.opacity = 1;
    r.style.opacity = 1;
  }, 400);

}, 3000);
</script>

</body>
</html>
