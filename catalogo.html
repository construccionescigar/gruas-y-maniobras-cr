<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Catálogo | Grúas</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

/* 🔥 FONDO */
body{
  min-height:100vh;
  position:relative;
  color:white;
  overflow-x:hidden;
}

/* fondo elegante */
body::before{
  content:"";
  position:fixed;
  inset:0;

  background-image:url("https://images.unsplash.com/photo-1581092918056-0c4c3acd3789?auto=format&fit=crop&w=1600&q=80");
  background-size:cover;
  background-position:center;
  filter:brightness(0.35);
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.9));
  z-index:-1;
}

/* NAV */
nav{
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(12px);
  padding:14px 20px;
  position:sticky;
  top:0;
  z-index:1000;
  display:flex;
  justify-content:center;
  gap:18px;
  flex-wrap:wrap;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:700;
  opacity:0.85;
}

nav a:hover{
  color:#25D366;
}

/* HEADER MÁS PEQUEÑO (CORREGIDO) */
.header{
  text-align:center;
  padding:50px 20px 15px; /* 🔥 reducido */
}

.header h1{
  font-size:34px; /* 🔥 reducido */
  font-weight:900;
}

.header p{
  color:#cbd5e1;
  margin-top:6px;
  font-size:15px;
  opacity:0.85;
}

/* GRID */
.grid{
  max-width:1100px;
  margin:0 auto;
  padding:40px 20px 80px;

  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:18px;
}

/* TARJETAS SOLO IMAGEN */
.item{
  border-radius:14px;
  overflow:hidden;
  height:200px;
  position:relative;
  border:1px solid rgba(255,255,255,0.08);
  transition:0.3s;
}

.item:hover{
  transform:scale(1.03);
  border-color:rgba(37,211,102,0.5);
}

.item img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* RESPONSIVE */
@media(max-width:900px){
  .grid{
    grid-template-columns:repeat(2, 1fr);
  }
}

@media(max-width:500px){
  .grid{
    grid-template-columns:1fr;
  }

  .item{
    height:220px;
  }
}

</style>
</head>

<body>

<nav>
  <a href="index.html">Inicio</a>
  <a href="informacion.html">Información</a>
  <a href="servicios.html">Servicios</a>
  <a href="catalogo.html">Catálogo</a>
  <a href="contacto.html">Contacto</a>
</nav>

  <p>Galería de equipos y maniobras</p>
</div>
