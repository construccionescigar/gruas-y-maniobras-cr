<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Catálogo | Grúas</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

/* 🔥 FONDO */
body{
  min-height:100vh;
  position:relative;
  color:white;
  overflow-x:hidden;
}

/* fondo elegante */
body::before{
  content:"";
  position:fixed;
  inset:0;

  background-image:url("https://images.unsplash.com/photo-1581092918056-0c4c3acd3789?auto=format&fit=crop&w=1600&q=80");
  background-size:cover;
  background-position:center;
  filter:brightness(0.35);
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.9));
  z-index:-1;
}

/* NAV */
nav{
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(12px);
  padding:14px 20px;
  position:sticky;
  top:0;
  z-index:1000;
  display:flex;
  justify-content:center;
  gap:18px;
  flex-wrap:wrap;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:700;
  opacity:0.85;
}

nav a:hover{
  color:#25D366;
}

/* HEADER */
.header{
  text-align:center;
  padding:60px 20px 20px;
}

.header h1{
  font-size:40px;
  font-weight:900;
}

.header p{
  color:#cbd5e1;
  margin-top:10px;
}

/* GRID */
.grid{
  max-width:1100px;
  margin:0 auto;
  padding:40px 20px 80px;

  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:18px;
}

/* TARJETAS SOLO IMAGEN */
.item{
  border-radius:14px;
  overflow:hidden;
  height:200px;
  position:relative;
  border:1px solid rgba(255,255,255,0.08);
  transition:0.3s;
}

.item:hover{
  transform:scale(1.03);
  border-color:rgba(37,211,102,0.5);
}

.item img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* RESPONSIVE */
@media(max-width:900px){
  .grid{
    grid-template-columns:repeat(2, 1fr);
  }
}

@media(max-width:500px){
  .grid{
    grid-template-columns:1fr;
  }

  .item{
    height:220px;
  }
}

</style>
</head>

<body>

<nav>
  <a href="index.html">Inicio</a>
  <a href="informacion.html">Información</a>
  <a href="servicios.html">Servicios</a>
  <a href="catalogo.html">Catálogo</a>
  <a href="contacto.html">Contacto</a>
</nav>

<div class="header">
  <h1>Catálogo de Grúas</h1>
  <p>Galería de equipos y maniobras</p>
</div>

<section class="grid">

  <div class="item"><img src="https://images.unsplash.com/photo-1594818379496-da1e345eb43f?auto=format&fit=crop&w=800&q=80"></div>
  <div class="item"><img src="https://images.unsplash.com/photo-1621905252507-b35492cc74b4?auto=format&fit=crop&w=800&q=80"></div>
  <div class="item"><img src="https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?auto=format&fit=crop&w=800&q=80"></div>
  <div class="item"><img src="https://images.unsplash.com/photo-1581091870622-0e3f6a7f1b6c?auto=format&fit=crop&w=800&q=80"></div>

  <div class="item"><img src="https://images.unsplash.com/photo-1600661653561-629509216228?auto=format&fit=crop&w=800&q=80"></div>
  <div class="item"><img src="https://images.unsplash.com/photo-1565043589221-1a6fd9ae45c7?auto=format&fit=crop&w=800&q=80"></div>
  <div class="item"><img src="https://images.unsplash.com/photo-1602080858428-57174f9431cf?auto=format&fit=crop&w=800&q=80"></div>
  <div class="item"><img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=800&q=80"></div>

</section>

</body>
</html>
