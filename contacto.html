<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grúas | Contacto</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
}

/* HEADER */
header{
  background:#000;
  padding:15px;
  text-align:center;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 15px;
  font-weight:bold;
}

/* 🔥 GRID 4 IMÁGENES BALANCEADAS */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  min-height:600px;
  position:relative;
  overflow:hidden;
}

/* CADA CUADRO */
.tile{
  background-size:cover;
  background-position:center;
  position:relative;
}

/* IMÁGENES */
.t1{
  background:url('https://res.cloudinary.com/deod0oalc/image/upload/08084e6f-ae2e-4300-a621-bfe6c7b55288_ss7txl.jpg');
}

.t2{
  background:url('https://res.cloudinary.com/deod0oalc/image/upload/9e4a9d3f-a5d8-4d66-80bd-86908a1adf54_agiwts.jpg');
}

.t3{
  background:url('https://res.cloudinary.com/deod0oalc/image/upload/70dddf35-39d3-4891-a764-2997a45dddf2_orvzhk.jpg');
}

.t4{
  background:url('https://res.cloudinary.com/deod0oalc/image/upload/6dab0765-8b3a-497b-9d3c-c81397096391_dz5yzg.jpg');
}

/* overlay general elegante */
.container::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.35);
  z-index:1;
}

/* CARD CENTRAL */
.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#e5e5e5;
  padding:40px 25px;
  border-radius:15px;
  width:100%;
  max-width:450px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  z-index:2;
}

/* BOTONES */
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;

  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

.wa{background:#25D366;color:white;}
.call{background:black;color:white;}
.mail{background:#cfcfcf;color:black;}

/* WHATSAPP FLOTANTE */
.whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:#25D366;
  color:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  text-decoration:none;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  z-index:9999;
}

</style>
</head>

<body>

<header>
<nav>
  <a href="index.html">Inicio</a>
  <a href="informacion.html">Información</a>
  <a href="contacto.html">Contacto</a>

</header>

<!-- 🔥 GRID 4 IMÁGENES -->
<div class="container">

  <div class="tile t1"></div>
  <div class="tile t2"></div>
  <div class="tile t3"></div>
  <div class="tile t4"></div>

  <!-- CARD CENTRAL -->
  <div class="card">

    <h2>Comuníquese con nosotros</h2>

    <a class="btn wa" href="https://wa.me/5217771330689">💬 WhatsApp</a>

    <a class="btn call" href="tel:+527771330689">📞 Llamar ahora</a>

    <a class="btn mail" href="https://mail.google.com/mail/?view=cm&fs=1&to=gruascr21@gmail.com">✉️ Correo</a>

  </div>

</div>

<a href="https://wa.me/5217771330689" class="whatsapp-float">💬</a>

</body>
</html>
