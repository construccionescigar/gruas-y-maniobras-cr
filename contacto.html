<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grúas | Contacto</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

body{
  background:
    radial-gradient(circle at top, rgba(37,211,102,0.10), transparent 45%),
    radial-gradient(circle at bottom, rgba(255,255,255,0.03), transparent 55%),
    #0b0f14;
  color:white;
}

/* NAV */
nav{
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(12px);
  padding:14px 20px;
  position:sticky;
  top:0;
  z-index:1000;
  display:flex;
  justify-content:center;
  gap:18px;
  flex-wrap:wrap;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

nav a{
  color:white;
  text-decoration:none;
  font-size:15px;
  font-weight:600;
  opacity:0.85;
  transition:0.3s;
}

nav a:hover{
  opacity:1;
  color:#25D366;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px 30px;
}

/* 🔥 SLOGAN ARRIBA */
.slogan{
  font-size:20px;
  font-weight:800;
  color:#25D366;
  margin-bottom:20px;
  min-height:28px;
  transition:opacity 0.5s ease;
}

.hero-logo img{
  height:260px;
  max-width:90%;
  margin-bottom:10px;
  filter:drop-shadow(0 15px 30px rgba(0,0,0,0.6));
}

.hero h1{
  font-size:42px;
  font-weight:900;
  margin-bottom:10px;
}

.hero p{
  opacity:0.85;
  font-size:16px;
  color:#cbd5e1;
}

/* BADGE */
.badge{
  display:inline-block;
  margin-top:15px;
  padding:10px 16px;
  border-radius:50px;
  background:rgba(37,211,102,0.12);
  border:1px solid rgba(37,211,102,0.35);
  color:#25D366;
  font-weight:700;
  font-size:14px;
  box-shadow:0 0 25px rgba(37,211,102,0.10);
}

/* CARD */
.card{
  max-width:440px;
  margin:45px auto;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:28px;
  text-align:center;
  backdrop-filter:blur(12px);
  box-shadow:0 25px 50px rgba(0,0,0,0.45);
}

.card h2{
  margin-bottom:18px;
  font-size:20px;
  font-weight:800;
}

/* BUTTONS */
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  text-decoration:none;
  font-weight:800;
  font-size:15px;
  transition:0.3s;
}

.wa{
  background:#25D366;
  color:white;
  box-shadow:0 10px 25px rgba(37,211,102,0.25);
}

.wa:hover{
  background:#1ebe5d;
  transform:translateY(-2px);
}

.call{
  background:#111827;
  border:1px solid rgba(255,255,255,0.15);
}

.call:hover{
  border-color:#25D366;
}

.mail{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
}

.mail:hover{
  border-color:rgba(37,211,102,0.4);
}

/* FLOAT WHATSAPP */
.whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:62px;
  height:62px;
  background:#25D366;
  color:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  text-decoration:none;
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
  z-index:9999;
}

.whatsapp-float:hover{
  transform:scale(1.08);
}

/* RESPONSIVE */
@media(max-width:768px){

  .hero h1{
    font-size:28px;
  }

  .hero-logo img{
    height:120px;
  }

  .slogan{
    font-size:16px;
  }

  .card{
    width:90%;
  }
}

</style>
</head>

<body>

<nav>
  <a href="index.html">Inicio</a>
  <a href="informacion.html">Información</a>
  <a href="servicios.html">Servicios</a>
  <a href="catalogo.html">Catálogo</a>
  <a href="contacto.html">Contacto</a>
</nav>

<section class="hero">

  <!-- 🔥 SLOGAN DINÁMICO -->
  <div class="slogan" id="slogan">Cotiza hoy, eleva tu proyecto mañana</div>

  <div class="hero-logo">
    <img src="https://res.cloudinary.com/deod0oalc/image/upload/LogoGruaPNG_xpqskn.png">
  </div>

  <h1>Contacto</h1>

  <p>Atención profesional en renta de grúas y maniobras industriales</p>

  <div class="badge">⚡ Respuesta rápida • Servicio Eficaz</div>

</section>

<div class="card">

  <h2>Comuníquese con nosotros</h2>

  <a class="btn wa" href="https://wa.me/5217771330689" target="_blank">
    💬 WhatsApp directo
  </a>

  <a class="btn call" href="tel:+527771330689">
    📞 Llamar ahora
  </a>

  <a class="btn mail" href="mailto:gruascr21@gmail.com">
    ✉️ Enviar correo
  </a>

</div>

<a href="https://wa.me/5217771330689" class="whatsapp-float">💬</a>

<!-- 🔥 SCRIPT SLOGANS -->
<script>
const slogans = [
  "Cotiza hoy, eleva tu proyecto mañana",
  "Respuesta rápida para trabajos urgentes",
  "Tu maniobra empieza con un mensaje",
  "Estamos listos para mover lo imposible",
  "Soluciones inmediatas para carga pesada",
  "Tiempo es dinero… nosotros respondemos rápido",
  "Contáctanos y pon tu proyecto en marcha",
  "Expertos listos para atenderte"
];

let i = 0;
const el = document.getElementById("slogan");

setInterval(() => {
  el.style.opacity = 0;

  setTimeout(() => {
    i = (i + 1) % slogans.length;
    el.textContent = slogans[i];
    el.style.opacity = 1;
  }, 400);

}, 7000);
</script>

</html>
