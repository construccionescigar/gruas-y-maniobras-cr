<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;

body{
  background:#0f172a;
  overflow-x:hidden;
}

/* HEADER */
header{
  background:#000;
  padding:15px;
  text-align:center;
  position:relative;
  z-index:10;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 15px;
  font-weight:bold;
}

/* HERO (LOGO NO SE TOCA) */
.hero{
  position:relative;
  text-align:center;
  color:white;
  padding:60px 20px;
  z-index:2;
}

.hero-logo img{
  height:220px;
  margin-bottom:10px;
}

.hero h1{
  font-size:40px;
}

/* 🔥 COLLAGE DE FONDO 4 IMÁGENES */
.collage{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  z-index:0;
}

.collage div{
  background-size:cover;
  background-position:center;
  filter:brightness(0.75);
}

/* IMÁGENES */
.i1{
  background-image:url('https://res.cloudinary.com/deod0oalc/image/upload/08084e6f-ae2e-4300-a621-bfe6c7b55288_ss7txl.jpg');
}

.i2{
  background-image:url('https://res.cloudinary.com/deod0oalc/image/upload/9e4a9d3f-a5d8-4d66-80bd-86908a1adf54_agiwts.jpg');
}

.i3{
  background-image:url('https://res.cloudinary.com/deod0oalc/image/upload/70dddf35-39d3-4891-a764-2997a45dddf2_orvzhk.jpg');
}

.i4{
  background-image:url('https://res.cloudinary.com/deod0oalc/image/upload/6dab0765-8b3a-497b-9d3c-c81397096391_dz5yzg.jpg');
}

/* OVERLAY GENERAL SUAVE */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  z-index:1;
}

/* CARD CENTRADA */
.card{
  position:relative;
  margin:40px auto;
  background:#e5e5e5;
  padding:40px 25px;
  border-radius:15px;
  width:100%;
  max-width:420px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  z-index:2;
}

/* BOTONES */
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;

  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

.wa{background:#25D366;color:white;}
.call{background:black;color:white;}
.mail{background:#cfcfcf;color:black;}

/* WHATSAPP */
.whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:#25D366;
  color:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  text-decoration:none;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  z-index:9999;
}
