<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grúas | Contacto</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
}

/* HEADER */
header{
  background:#000;
  padding:15px;
  text-align:center;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 15px;
  font-weight:bold;
}

/* HERO */
.hero{
  background:#000;
  color:white;
  text-align:center;
  padding:60px 20px;
}

.hero-logo img{
  height:240px;
  margin-bottom:15px;
}

/* CONTENEDOR CON MARCO (3ra imagen) */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:50px;
  position:relative;
  min-height:450px;

  /* 🔥 3RA IMAGEN COMO BORDE */
  border:40px solid transparent;
  border-image-source: url('https://res.cloudinary.com/deod0oalc/image/upload/08084e6f-ae2e-4300-a621-bfe6c7b55288_ss7txl.jpg');
  border-image-slice: 30;
  border-image-repeat: stretch;
}

/* FONDO INTERIOR (2 IMÁGENES) */
.bg{
  position:absolute;
  inset:0;
  z-index:0;
}

/* IMAGEN IZQUIERDA */
.bg1{
  position:absolute;
  top:0;
  left:0;
  width:50%;
  height:100%;
  background:url('https://res.cloudinary.com/deod0oalc/image/upload/9e4a9d3f-a5d8-4d66-80bd-86908a1adf54_agiwts.jpg')
  center/cover no-repeat;
}

/* IMAGEN DERECHA */
.bg2{
  position:absolute;
  top:0;
  right:0;
  width:50%;
  height:100%;
  background:url('https://res.cloudinary.com/deod0oalc/image/upload/70dddf35-39d3-4891-a764-2997a45dddf2_orvzhk.jpg')
  center/cover no-repeat;
}

/* OSCURECER SOLO INTERIOR */
.container::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.35);
  z-index:1;
}

/* CARD */
.card{
  background:#e5e5e5;
  padding:40px 25px;
  border-radius:15px;
  width:100%;
  max-width:450px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  position:relative;
  z-index:2;
}

/* BOTONES */
.btn{
  display:block;
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

.wa{background:#25D366;color:white;}
.call{background:black;color:white;}
.mail{background:#cfcfcf;color:black;}

/* WHATSAPP FLOTANTE */
.whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:#25D366;
  color:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  text-decoration:none;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  z-index:9999;
}

</style>
</head>

<body>

<header>
<nav>
  <a href="index.html">Inicio</a>
  <a href="informacion.html">Información</a>
  <a href="contacto.html">Contacto</a>
</nav>
</header>

<section class="hero">

  <div class="hero-logo">
    <img src="https://res.cloudinary.com/deod0oalc/image/upload/26ee7d16-8917-402c-bfd4-e442ab53bcb5_o2s2vv.png">
  </div>

  <h1>Contacto</h1>

</section>

<div class="container">

  <!-- COLAGE INTERIOR -->
  <div class="bg">
    <div class="bg1"></div>
    <div class="bg2"></div>
  </div>

  <!-- CARD -->
  <div class="card">

    <h2>Comuníquese con nosotros</h2>

    <a class="btn wa" href="https://wa.me/5217771330689">WhatsApp</a>
    <a class="btn call" href="tel:+527771330689">Llamar</a>
    <a class="btn mail" href="https://mail.google.com/mail/?view=cm&fs=1&to=gruascr21@gmail.com">Correo</a>

  </div>

</div>

<a href="https://wa.me/5217771330689" class="whatsapp-float">💬</a>

</body>
</html>
