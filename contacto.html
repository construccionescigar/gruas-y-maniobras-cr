<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CIGAR | Contacto</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f4f6f8;
}

/* NAV GLOBAL */
nav{
  background:#000;
  padding:15px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:1000;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 15px;
  font-size:16px;
  font-weight:bold;
  transition:0.3s;
}

nav a:hover{
  opacity:0.7;
}

/* HEADER */
.header{
  background:#111;
  color:white;
  padding:80px 20px;
  text-align:center;
}

.header h1{
  font-size:40px;
  margin-bottom:10px;
}

.header p{
  opacity:0.8;
  font-size:18px;
}

/* CONTACTO SECTION */
.container{
  padding:70px 20px;
  text-align:center;
}

.box{
  background:white;
  max-width:500px;
  margin:auto;
  padding:30px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.box h2{
  margin-bottom:20px;
}

.info{
  margin:15px 0;
  font-size:16px;
  color:#333;
}

/* BOTONES */
.btn{
  display:block;
  margin:15px auto;
  padding:14px;
  width:100%;
  max-width:300px;
  text-decoration:none;
  font-weight:bold;
  border-radius:8px;
  transition:0.3s;
}

/* WhatsApp */
.wa{
  background:#25D366;
  color:white;
}

.wa:hover{
  background:#1ebe5d;
}

/* Llamada */
.call{
  background:#000;
  color:white;
}

.call:hover{
  opacity:0.8;
}

/* EMAIL */
.mail{
  background:#ddd;
  color:#000;
}

.mail:hover{
  background:#ccc;
}

/* RESPONSIVE */
@media(max-width:600px){
  .header h1{font-size:28px;}
}
</style>
</head>

<body>

<!-- NAV CORREGIDO -->
<nav>
  <a href="index.html">Inicio</a>
  <a href="informacion.html">Información</a>
  <a href="contacto.html">Contacto</a>
</nav>

<!-- HEADER -->
<div class="header">
  <h1>Contacto</h1>
  <p>Respuesta rápida para cotizaciones y disponibilidad</p>
</div>

<!-- CONTACTO -->
<div class="container">

  <div class="box">

    <h2>Comunícate con nosotros</h2>

    <div class="info">
      📍 <strong>Servicios en todo México</strong><br><br>
      📩 Para más información, favor de comunicarse vía uno de los siguientes métodos:
    </div>

    <a class="btn wa" href="https://wa.me/0000000000" target="_blank">
      WhatsApp
    </a>

    <a class="btn call" href="tel:0000000000">
      Llamar ahora
    </a>

    <a class="btn mail" href="mailto:contacto@cigar.com">
      Enviar correo
    </a>

  </div>

</div>

</body>
</html>
